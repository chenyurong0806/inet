        // ==================== 右键菜单 ====================
        function openContextMenu(event, key, isFolder, index) {
            event.stopPropagation();
            if (isGuestMode) return;

            selectedKeys.clear();
            selectedKeys.add(key);
            activeFocusedItem = { key, isFolder };
            if (index !== undefined) lastSelectedIndex = index;
            renderWorkspace();

            const menu = document.getElementById("action-menu");
            menu.innerHTML = "";

            if (key.startsWith('.trash/')) {
                menu.innerHTML +=
                    `<div class="menu-item ripple-btn" onclick="triggerRestore()"><span class="material-symbols-outlined">restore_from_trash</span>恢复文件</div>`;
                menu.innerHTML +=
                    `<div class="menu-item ripple-btn danger-item" onclick="triggerDelete()"><span class="material-symbols-outlined">delete_forever</span>彻底删除</div>`;
            } else {
                const starText = starredKeys.has(key) ? "取消星标" : "添加星标";
                const starIcon = starredKeys.has(key) ? "star" : "star_border";

                if (isFolder) {
                    menu.innerHTML +=
                        `<div class="menu-item ripple-btn" onclick="jumpToPath('${key}'); closeActionMenu();"><span class="material-symbols-outlined">folder_open</span>打开文件夹</div>`;
                } else {
                    const ext = key.split('.').pop().toLowerCase();
                    const previewable = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'mp4', 'webm', 'pdf', 'txt', 'md'].includes(ext);
                    if (previewable) {
                        menu.innerHTML +=
                            `<div class="menu-item ripple-btn" onclick="triggerPreview()"><span class="material-symbols-outlined">visibility</span>在线预览</div>`;
                    }
                    menu.innerHTML +=
                        `<div class="menu-item ripple-btn" onclick="triggerDownload()"><span class="material-symbols-outlined">download</span>下载文件</div>`;
                    menu.innerHTML += `<div class="menu-item ripple-btn" onclick="triggerCopyShareLink()"><span class="material-symbols-outlined">link</span>复制共享链接</div>`;
                }

                menu.innerHTML +=
                    `<div class="menu-item ripple-btn" onclick="handleCopy(); closeActionMenu();"><span class="material-symbols-outlined">content_copy</span>复制</div>`;
                menu.innerHTML +=
                    `<div class="menu-item ripple-btn" onclick="handleCut(); closeActionMenu();"><span class="material-symbols-outlined">content_cut</span>剪切</div>`;
                if (clipboard.type && clipboard.items.length > 0) {
                    menu.innerHTML +=
                        `<div class="menu-item ripple-btn" onclick="handlePaste(); closeActionMenu();"><span class="material-symbols-outlined">content_paste</span>粘贴至当前</div>`;
                }

                menu.innerHTML +=
                    `<div class="menu-item ripple-btn" onclick="toggleStar('${key}')"><span class="material-symbols-outlined">${starIcon}</span>${starText}</div>`;
                menu.innerHTML +=
                    `<div class="menu-item ripple-btn" onclick="openRenameDialog()"><span class="material-symbols-outlined">edit</span>重命名</div>`;
                menu.innerHTML +=
                    `<div class="menu-item ripple-btn" onclick="openMoveDialog()"><span class="material-symbols-outlined">drive_file_move</span>移动</div>`;
                menu.innerHTML +=
                    `<div class="menu-item ripple-btn danger-item" onclick="triggerDelete()"><span class="material-symbols-outlined">delete</span>删除</div>`;
            }

            menu.classList.add("show");

            let topPos = event.clientY;
            if (topPos + menu.offsetHeight > window.innerHeight) topPos = window.innerHeight - menu.offsetHeight - 10;
            menu.style.top = `${topPos}px`;

            let leftPos = event.clientX;
            if (leftPos + menu.offsetWidth > window.innerWidth) leftPos = window.innerWidth - menu.offsetWidth - 10;
            menu.style.left = `${leftPos}px`;
        }

        async function triggerCopyShareLink() {
            const token = localStorage.getItem("auth_token") || "";
            const url = `https://api.inets.de5.net/api/download?key=${encodeURIComponent(activeFocusedItem.key)}&token=${encodeURIComponent(token)}`;
            navigator.clipboard.writeText(url).then(() => {
                showSnackbar("共享链接已复制到剪贴板");
            }).catch(() => {
                showSnackbar("复制失败，请手动复制链接");
            });
            closeActionMenu();
        }

        function closeActionMenu() { document.getElementById("action-menu").classList.remove("show"); }

        // ==================== 复制/剪切/粘贴 ====================
        function handleCopy() {
            if (selectedKeys.size === 0) return;
            clipboard = { type: 'copy', items: currentRenderedItems.filter(i => selectedKeys.has(i.key)) };
            showSnackbar(`已复制 ${clipboard.items.length} 个项目`);
        }

        function handleCut() {
            if (selectedKeys.size === 0) return;
            clipboard = { type: 'cut', items: currentRenderedItems.filter(i => selectedKeys.has(i.key)) };
            showSnackbar(`已剪切 ${clipboard.items.length} 个项目`);
        }

        async function handlePaste() {
            if (!clipboard.type || clipboard.items.length === 0) return;
            const targetDir = currentPath;

            const actionItems = [];

            await runMutation(async () => {
                for (const item of clipboard.items) {
                    const name = item.key.split('/').filter(Boolean).pop();
                    const newKey = targetDir + name + (item.isFolder ? '/' : '');

                    if (item.key === newKey || newKey.startsWith(item.key)) continue;

                    if (clipboard.type === 'cut') {
                        await fetchAPI(`/move`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ oldKey: item.key, newKey })
                        });
                        actionItems.push({ oldKey: item.key, newKey });
                    } else if (clipboard.type === 'copy') {
                        await fetchAPI(`/copy`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ oldKey: item.key, newKey })
                        });
                        actionItems.push({ oldKey: item.key, newKey });
                    }
                }
            }, "粘贴成功", { type: clipboard.type, items: actionItems });

            if (clipboard.type === 'cut') {
                clipboard = { type: null, items: [] };
            }
        }

        // ==================== 预览与下载 ====================
        async function triggerPreview() {
            const token = localStorage.getItem("auth_token") || "";
            // 增加 preview 和 inline 参数，通知后端在浏览器中展现而非强制下载
            const url = `https://api.inets.de5.net/api/download?key=${encodeURIComponent(activeFocusedItem.key)}&token=${encodeURIComponent(token)}&preview=1&inline=true`;
            window.open(url, "_blank");
            closeActionMenu();
        }

        async function triggerDownload() {
            const token = localStorage.getItem("auth_token") || "";
            const url = `https://api.inets.de5.net/api/download?key=${encodeURIComponent(activeFocusedItem.key)}&token=${encodeURIComponent(token)}`;
            const a = document.createElement("a");
            a.href = url;
            a.download = "";
            a.style.display = "none";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            closeActionMenu();
        }

        // ==================== 重命名 ====================
        function openRenameDialog() {
            closeActionMenu();
            const name = activeFocusedItem.key.split('/').filter(Boolean).pop();
            document.getElementById("rename-input").value = name;
            openDialog("rename-dialog");
        }

        async function triggerRename() {
            const newName = document.getElementById("rename-input").value.trim();
            if (!newName) return;
            const oldKey = activeFocusedItem.key;
            let dirPath = "";
            if (activeFocusedItem.isFolder) {
                const parts = oldKey.split('/').filter(Boolean);
                parts.pop();
                dirPath = parts.length > 0 ? parts.join('/') + '/' : '';
            } else {
                dirPath = oldKey.substring(0, oldKey.lastIndexOf("/") + 1);
            }

            let newKey = dirPath + newName + (activeFocusedItem.isFolder ? "/" : "");

            if (starredKeys.has(oldKey)) {
                starredKeys.delete(oldKey);
                starredKeys.add(newKey);
                saveStarredKeys();
            }

            let actionPayload = { type: 'move', items: [{ oldKey, newKey }] };
            await runMutation(async () => {
                await fetchAPI(`/move`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ oldKey, newKey })
                });
            }, "操作成功", actionPayload);

            closeDialog("rename-dialog");
        }

        // ==================== 删除与恢复 ====================
        async function triggerDelete() {
            const targetKey = activeFocusedItem.key;
            if (starredKeys.has(targetKey)) {
                starredKeys.delete(targetKey);
                saveStarredKeys();
            }

            if (currentView === 'trash' || targetKey.startsWith('.trash/')) {
                await runMutation(async () => {
                    await fetchAPI(`/delete?key=${encodeURIComponent(targetKey)}`, { method: "DELETE" });
                }, "已彻底删除");
            } else {
                const newKey = '.trash/' + targetKey;
                let actionPayload = { type: 'move', items: [{ oldKey: targetKey, newKey }] };

                await runMutation(async () => {
                    await fetchAPI(`/move`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ oldKey: targetKey, newKey })
                    });
                }, "已移至最近删除", actionPayload);
            }
            closeActionMenu();
        }

        async function triggerRestore() {
            const oldKey = activeFocusedItem.key;
            const newKey = oldKey.replace('.trash/', '');

            let actionPayload = { type: 'move', items: [{ oldKey, newKey }] };
            await runMutation(async () => {
                await fetchAPI(`/move`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ oldKey, newKey })
                });
            }, "已恢复文件", actionPayload);

            closeActionMenu();
        }

        // ==================== 移动对话框 ====================
        function parseFolderStructure() {
            const tree = { name: "我的云盘", key: "", children: {} };
            rawFilesData.forEach(item => {
                const key = item.key;
                if (key.startsWith('.trash/')) return;
                const isFolder = key.endsWith('/');
                if (isFolder) {
                    const parts = key.split('/').filter(Boolean);
                    let currentLevel = tree.children;
                    let currentPathBuild = "";
                    parts.forEach((part, i) => {
                        currentPathBuild += part + '/';
                        if (!currentLevel[part]) {
                            currentLevel[part] = { name: part, key: currentPathBuild, children: {} };
                        }
                        currentLevel = currentLevel[part].children;
                    });
                }
            });
            return tree;
        }

        function renderTreeUI(node, depth, container) {
            if (activeFocusedItem.isFolder && node.key.startsWith(activeFocusedItem.key)) return;

            const isExpanded = expandedFolders.has(node.key);
            const hasChildren = Object.keys(node.children).length > 0;
            const isSelected = targetMoveFolder === node.key;

            const row = document.createElement("div");
            row.className = `tree-node-row ripple-btn ${isSelected ? 'selected' : ''}`;

            const indentSpace = document.createElement("div");
            indentSpace.className = "tree-indent";
            indentSpace.style.width = `${depth * 24 + 16}px`;

            const icon = document.createElement("span");
            icon.className = "material-symbols-outlined tree-icon";
            icon.innerText = "folder";

            const nameSpan = document.createElement("span");
            nameSpan.className = "tree-name";
            nameSpan.innerText = node.name;

            row.appendChild(indentSpace);
            row.appendChild(icon);
            row.appendChild(nameSpan);

            if (hasChildren) {
                const chevron = document.createElement("span");
                chevron.className = `material-symbols-outlined tree-chevron ${isExpanded ? 'expanded' : ''}`;
                chevron.innerText = "chevron_right";

                chevron.onclick = (e) => {
                    e.stopPropagation();
                    if (isExpanded) expandedFolders.delete(node.key);
                    else expandedFolders.add(node.key);
                    refreshTreeUI();
                };
                row.appendChild(chevron);
            }

            row.onclick = () => {
                targetMoveFolder = node.key;
                updateMoveSubtitle();
                refreshTreeUI();
            };

            container.appendChild(row);

            if (isExpanded && hasChildren) {
                Object.values(node.children).forEach(childNode => {
                    renderTreeUI(childNode, depth + 1, container);
                });
            }
        }

        function refreshTreeUI() {
            const container = document.getElementById("move-tree-container");
            container.innerHTML = "";
            renderTreeUI(folderTreeData, 0, container);
        }

        function updateMoveSubtitle() {
            const sub = document.getElementById("move-subtitle-text");
            const targetName = targetMoveFolder === "" ? "我的云盘" : targetMoveFolder.split('/').filter(Boolean).pop();
            sub.innerText = `项目将被移动到 "${targetName}"`;
        }

        function openMoveDialog() {
            closeActionMenu();
            folderTreeData = parseFolderStructure();
            targetMoveFolder = "";
            expandedFolders = new Set([""]);

            const isF = activeFocusedItem.isFolder;
            const name = isF ? activeFocusedItem.key.split('/').filter(Boolean).pop() : activeFocusedItem.key.split('/')
                .pop();
            document.getElementById("move-preview-icon").innerText = isF ? "folder" : "description";
            document.getElementById("move-preview-icon").style.color = isF ? "var(--md-sys-color-primary)" : "#9C27B0";
            document.getElementById("move-preview-name").innerText = name;

            updateMoveSubtitle();
            refreshTreeUI();
            openDialog('move-dialog');
        }

        async function triggerMoveFile() {
            const oldKey = activeFocusedItem.key;
            let newKey = targetMoveFolder + (activeFocusedItem.isFolder ? oldKey.split('/').filter(Boolean).pop() +
                "/" : oldKey.substring(oldKey.lastIndexOf("/") + 1));

            if (starredKeys.has(oldKey)) {
                starredKeys.delete(oldKey);
                starredKeys.add(newKey);
                saveStarredKeys();
            }

            let actionPayload = { type: 'move', items: [{ oldKey, newKey }] };
            await runMutation(async () => {
                await fetchAPI(`/move`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ oldKey, newKey })
                });
            }, "操作成功", actionPayload);

            closeDialog('move-dialog');
        }

        async function executeBatchMoveAPI(items, targetFolderKey) {
            const actionItems = [];
            await runMutation(async () => {
                for (const item of items) {
                    if (item.key !== targetFolderKey && !targetFolderKey.startsWith(item.key)) {
                        const name = item.key.split('/').filter(Boolean).pop();
                        const newKey = targetFolderKey + name + (item.isFolder ? '/' : '');

                        if (starredKeys.has(item.key)) {
                            starredKeys.delete(item.key);
                            starredKeys.add(newKey);
                        }

                        await fetchAPI(`/move`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ oldKey: item.key, newKey })
                        });
                        actionItems.push({ oldKey: item.key, newKey });
                    }
                }
                saveStarredKeys();
            }, "操作成功", { type: 'move', items: actionItems });
        }

        // ==================== 搜索 ====================
        function handleAdvancedSearch() {
            if (isGuestMode) return;
            const queryStr = document.getElementById("search-input").value.toLowerCase().trim();
            const dropdown = document.getElementById("search-dropdown");
            const countEl = document.getElementById("search-count");
            dropdown.innerHTML = "";

            if (!queryStr) {
                dropdown.classList.remove("show");
                countEl.innerText = "";
                return;
            }
            const queries = queryStr.split(/\s+/);

            const results = rawFilesData.filter(file => {
                if (file.key.startsWith('.trash/')) return false;
                const name = file.key.toLowerCase();
                const ext = name.split('.').pop();
                return queries.every(q => name.includes(q) || ext.includes(q));
            });

            countEl.innerText = `共 ${results.length} 项`;
            if (results.length > 0) dropdown.classList.add("show");
            else dropdown.classList.remove("show");

            results.forEach(file => {
                const isFolder = file.key.endsWith("/");
                const fileName = isFolder ? file.key.split('/').filter(Boolean).pop() : file.key.split('/').pop();
                const row = document.createElement("div");
                row.className = "search-result-item ripple-btn";
                row.innerHTML =
                    `<div class="sr-name"><span class="material-symbols-outlined" style="vertical-align:middle; font-size:18px; margin-right:8px; color:${isFolder ? 'var(--md-sys-color-primary)' : 'var(--md-sys-color-outline)'}">${isFolder ? 'folder' : 'description'}</span>${fileName}</div>
                                 <div class="sr-path">${file.key}</div>`;
                row.onclick = () => {
                    dropdown.classList.remove("show");
                    document.getElementById("search-input").value = "";
                    countEl.innerText = "";
                    const targetFolder = isFolder ? file.key : file.key.substring(0, file.key.lastIndexOf(
                        "/") + 1);
                    currentView = 'drive';
                    document.getElementById("nav-starred").classList.remove("active");
                    document.getElementById("nav-drive").classList.add("active");
                    jumpToPath(targetFolder);
                    setTimeout(() => {
                        selectedKeys.clear();
                        selectedKeys.add(file.key);
                        renderWorkspace();
                    }, 100);
                };
                dropdown.appendChild(row);
            });
        }

        // ==================== 对话框与提示 ====================
        function openDialog(id) { document.getElementById(id).classList.add("show"); }

        function closeDialog(id) { document.getElementById(id).classList.remove("show"); }

        function showSnackbar(msg) {
            const bar = document.getElementById("global-snackbar");
            bar.innerText = msg;
            bar.classList.add("show");
            setTimeout(() => { bar.classList.remove("show"); }, 3000);
        }

        // ==================== 涟漪效果 ====================
        function createRipple(event, button) {
            const circle = document.createElement("span");
            const diameter = Math.max(button.clientWidth, button.clientHeight);
            const radius = diameter / 2;
            const rect = button.getBoundingClientRect();

            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${event.clientX - rect.left - radius}px`;
            circle.style.top = `${event.clientY - rect.top - radius}px`;
            circle.classList.add("ripple");

            const existing = button.querySelector('.ripple');
            if (existing) existing.remove();

            button.appendChild(circle);
            setTimeout(() => circle.remove(), 600);
        }

        // ==================== 全局监听 ====================
        function setupGlobalListeners() {
            document.addEventListener("mousedown", function (e) {
                const rippleBtn = e.target.closest('.ripple-btn');
                if (rippleBtn && !rippleBtn.disabled) createRipple(e, rippleBtn);
            });

            document.addEventListener("click", (e) => {
                closeActionMenu();
                if (!e.target.closest('.user-profile-wrapper')) document.getElementById("user-menu").classList
                    .remove("show");
                if (!e.target.closest('.search-container')) document.getElementById("search-dropdown").classList
                    .remove("show");

                if (window.innerWidth < 900) {
                    const drawer = document.getElementById("app-drawer");
                    const overlay = document.getElementById("drawer-overlay");
                    if (drawer.classList.contains("open") && !drawer.contains(e.target) && !e.target.closest(
                        '.icon-btn')) {
                        drawer.classList.remove("open");
                        overlay.classList.remove("show");
                    }
                }
            });

            document.addEventListener("keydown", (e) => {
                if (isGuestMode) return;
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
                    e.preventDefault();
                    execUndo();
                }
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') {
                    e.preventDefault();
                    execRedo();
                }
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'c') {
                    e.preventDefault();
                    handleCopy();
                }
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'x') {
                    e.preventDefault();
                    handleCut();
                }
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'v') {
                    e.preventDefault();
                    handlePaste();
                }
                if (e.altKey && e.key.toLowerCase() === 'a') {
                    e.preventDefault();
                    currentRenderedItems.forEach(item => selectedKeys.add(item.key));
                    renderWorkspace();
                }
            });

            window.addEventListener("beforeunload", () => {
                if (activeUploadAborter) {
                    activeUploadAborter.abort();
                }
            });
        }

        // ==================== 工具函数 ====================
        function formatBytes(bytes, decimals = 2) {
            if (!bytes) return '0 B';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }
    </script>
